app = "kindle-pibrarian-api"
primary_region = "ewr"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Scale to zero when idle to avoid any always-on cost. Trade-off: the first
  # request after idle pays a cold start (the webapp now shows a graceful error
  # + retry rather than a silent stall if that ever exceeds the timeout).
  min_machines_running = 0

  # Health check so Fly (and any external uptime monitor) can see the app is up.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
